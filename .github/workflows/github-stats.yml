name: Update GitHub Stats

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  stats:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Generate stats card
        uses: marttp/github-stats-creator@v1
        with:
          card_type: stats
          theme: dark
          show_icons: true
          output_path: gh-stats.svg
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate top languages card
        uses: marttp/github-stats-creator@v1
        with:
          card_type: top-langs
          theme: dark
          langs_count: 8
          output_path: top-langs.svg
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate contribution graph
        uses: marttp/github-stats-creator@v1
        with:
          card_type: contribution-graph
          theme: dark
          output_path: contributions.svg
          github_token: ${{ secrets.GITHUB_TOKEN }}
