<g class="stat-row" style="animation-delay: 750ms" transform="translate(25, 100)">
      <svg class="stat-icon" viewBox="0 0 16 16" width="16" height="16" fill="#58a6ff">
        <path fill-rule="evenodd" d="M2 2.5A2.5 2.5 0 014.5 0h8.75a.75.75 0 01.75.75v12.5a.75.75 0 01-.75.75h-2.5a.75.75 0 110-1.5h1.75v-2h-8a1 1 0 00-.714 1.7.75.75 0 01-1.072 1.05A2.495 2.495 0 012 11.5v-9zm10.5-1h-8a1 1 0 00-1 1v6.708A2.486 2.486 0 014.5 9h8.5V1.5zm-8 11a1 1 0 100-2 1 1 0 000 2z"/>
      </svg>
      <text class="stat-label" x="24" y="12.5">Contributed to:</text>
      <text class="stat-value" y="12.5">5</text>
    </g>
    </g>
    <style>
      .stat-value { x: 155; }
    </style>
  
      </g>
    </svg>