<svg
      width="450"
      height="200"
      viewBox="0 0 450 200"
      fill="none"
      xmlns="http://www.w3.org/2000/svg"
      role="img"
    >
      <style>
        .header {
          font: 600 18px 'Segoe UI', Ubuntu, Sans-Serif;
          fill: #58a6ff;
          animation: fadeIn 0.8s ease-in-out forwards;
        }
        
    .stat-label {
      font: 400 14px 'Segoe UI', Ubuntu, Sans-Serif;
      fill: #c9d1d9;
    }
    .stat-value {
      font: 700 14px 'Segoe UI', Ubuntu, Sans-Serif;
      fill: #c9d1d9;
    }
    .stat-icon {
      y: -1;
    }
    .stat-row {
      opacity: 0;
      animation: slideUp 0.4s ease-in-out forwards;
    }
    .rank-circle-bg {
      stroke: #58a6ff;
      fill: none;
      stroke-width: 6;
      opacity: 0.15;
    }
    .rank-circle {
      stroke: #58a6ff;
      stroke-dasharray: 251.32741228718345;
      stroke-dashoffset: 251.32741228718345;
      fill: none;
      stroke-width: 6;
      stroke-linecap: round;
      transform-origin: 50% 50%;
      transform: rotate(-90deg);
      --progress-offset: 48.365849897495195;
      animation: rankAnim 1s 0.5s ease-in-out forwards;
    }
    .rank-label {
      font: 600 12px 'Segoe UI', Ubuntu, Sans-Serif;
      fill: #c9d1d9;
      opacity: 0.6;
    }
    .rank-level {
      font: 800 28px 'Segoe UI', Ubuntu, Sans-Serif;
      fill: #c9d1d9;
      animation: scaleIn 0.4s ease-in-out forwards;
    }
  
        
  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }
  @keyframes scaleIn {
    from { transform: translate(-5px, 5px) scale(0); }
    to { transform: translate(-5px, 5px) scale(1); }
  }
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes rankAnim {
    from { stroke-dashoffset: 251.2; }
    to { stroke-dashoffset: var(--progress-offset); }
  }

        
      </style>

      <rect
        x="0.5"
        y="0.5"
        rx="4.5"
        height="99%"
        width="449"
        stroke="#30363d"
        fill="#0d1117"
        stroke-opacity="1"
      />

      <text
            class="header"
            x="25"
            y="35"
            data-testid="header"
          >Thanaphoom Babparn's GitHub Stats</text>

      <g
        transform="translate(0, 55)"
      >
        
    <g transform="translate(370, 50)">
        <circle class="rank-circle-bg" cx="40" cy="40" r="40" />
        <circle class="rank-circle" cx="40" cy="40" r="40" />
        <text class="rank-label" x="40" y="28" text-anchor="middle">RANK</text>
        <text class="rank-level" x="40" y="56" text-anchor="middle">A</text>
      </g>
    <g>
      <g class="stat-row" style="animation-delay: 150ms" transform="translate(25, 0)">
      <svg class="stat-icon" viewBox="0 0 16 16" width="16" height="16" fill="#58a6ff">
