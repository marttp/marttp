<svg
      width="450"
      height="195"
      viewBox="0 0 450 195"
      fill="none"
      xmlns="http://www.w3.org/2000/svg"
    >
      <style>
        .header {
          font: 600 18px 'Segoe UI', Ubuntu, Sans-Serif;
          fill: #58a6ff;
          animation: fadeIn 0.8s ease-in-out forwards;
        }
        
    .stat {
      font: 600 14px 'Segoe UI', Ubuntu, Sans-Serif;
      fill: #c9d1d9;
    }
    .stagger {
      opacity: 0;
      animation: fadeIn 0.3s ease-in-out forwards;
    }
    .bold { font-weight: 700; }
    .icon { fill: #58a6ff; display: block; }
    .rank-circle-rim {
      stroke: #58a6ff;
      fill: none;
      stroke-width: 6;
      opacity: 0.2;
    }
    .rank-circle {
      stroke: #58a6ff;
      stroke-dasharray: 250;
      fill: none;
      stroke-width: 6;
      stroke-linecap: round;
      opacity: 0.8;
      transform-origin: -10px 8px;
      transform: rotate(-90deg);
      animation: rankAnim 1s forwards ease-in-out;
    }
    .rank-text {
      font: 800 24px 'Segoe UI', Ubuntu, Sans-Serif;
      fill: #c9d1d9;
      animation: scaleIn 0.3s ease-in-out forwards;
    }
    @keyframes rankAnim {
      from { stroke-dashoffset: 251.32741228718345; }
      to { stroke-dashoffset: 48.4144424061474; }
    }
  
        
        @keyframes fadeIn {
          from { opacity: 0; }
          to { opacity: 1; }
        }
        @keyframes scaleIn {
          from { transform: translate(-5px, 5px) scale(0); }
          to { transform: translate(-5px, 5px) scale(1); }
        }
        @keyframes slideIn {
          from { opacity: 0; transform: translateY(10px); }
          to { opacity: 1; transform: translateY(0); }
        }
      </style>

      <rect
        x="0.5"
        y="0.5"
        rx="4.5"
        height="99%"
        width="449"
        stroke="#30363d"
        fill="#0d1117"
        stroke-opacity="1"
      />

      <g transform="translate(25, 35)">
              <text class="header" data-testid="header">Thanaphoom Babparn's GitHub Stats</text>
            </g>

      <g
        transform="translate(0, 55)"
      >
        
    <g transform="translate(380, 47.5)">
        <circle class="rank-circle-rim" cx="-10" cy="8" r="40" />
        <circle class="rank-circle" cx="-10" cy="8" r="40" />
        <text class="rank-text" x="-5" y="15" text-anchor="middle">A</text>
      </g>
    <svg x="0" y="0">
      
