      </svg>
      <text class="stat-label" x="24" y="12.5">Total Stars:</text>
      <text class="stat-value" y="12.5">245</text>
    </g>
<g class="stat-row" style="animation-delay: 300ms" transform="translate(25, 25)">
      <svg class="stat-icon" viewBox="0 0 16 16" width="16" height="16" fill="#58a6ff">
        <path fill-rule="evenodd" d="M1.5 3.25a2.25 2.25 0 113 2.122v5.256a2.251 2.251 0 11-1.5 0V5.372A2.25 2.25 0 011.5 3.25zm5.677-.177L9.573.677A.25.25 0 0110 .854V2.5h1A2.5 2.5 0 0113.5 5v5.628a2.251 2.251 0 11-1.5 0V5a1 1 0 00-1-1h-1v1.646a.25.25 0 01-.427.177L7.177 3.427a.25.25 0 010-.354zM3.75 2.5a.75.75 0 100 1.5.75.75 0 000-1.5zm0 9.5a.75.75 0 100 1.5.75.75 0 000-1.5zm8.25.75a.75.75 0 111.5 0 .75.75 0 01-1.5 0z"/>
      </svg>
      <text class="stat-label" x="24" y="12.5">Total Commits:</text>
      <text class="stat-value" y="12.5">712</text>
    </g>
<g class="stat-row" style="animation-delay: 450ms" transform="translate(25, 50)">
      <svg class="stat-icon" viewBox="0 0 16 16" width="16" height="16" fill="#58a6ff">
        <path fill-rule="evenodd" d="M7.177 3.073L9.573.677A.25.25 0 0110 .854v4.792a.25.25 0 01-.427.177L7.177 3.427a.25.25 0 010-.354zM3.75 2.5a.75.75 0 100 1.5.75.75 0 000-1.5zm-2.25.75a2.25 2.25 0 113 2.122v5.256a2.251 2.251 0 11-1.5 0V5.372A2.25 2.25 0 011.5 3.25zm10.31 7.939a.75.75 0 00-1.042-.254 3.5 3.5 0 00-1.768 3.044.75.75 0 001.5 0 2 2 0 011.01-1.748.75.75 0 00.254-1.042h-.254zM3.75 12.5a.75.75 0 100 1.5.75.75 0 000-1.5z"/>
      </svg>
      <text class="stat-label" x="24" y="12.5">Total PRs:</text>
      <text class="stat-value" y="12.5">249</text>
    </g>
<g class="stat-row" style="animation-delay: 600ms" transform="translate(25, 75)">
      <svg class="stat-icon" viewBox="0 0 16 16" width="16" height="16" fill="#58a6ff">
        <path fill-rule="evenodd" d="M8 1.5a6.5 6.5 0 100 13 6.5 6.5 0 000-13zM0 8a8 8 0 1116 0A8 8 0 010 8zm9 3a1 1 0 11-2 0 1 1 0 012 0zm-.25-6.25a.75.75 0 00-1.5 0v3.5a.75.75 0 001.5 0v-3.5z"/>
      </svg>
      <text class="stat-label" x="24" y="12.5">Total Issues:</text>
      <text class="stat-value" y="12.5">1</text>
